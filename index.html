<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Airlearn Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --label-latest:#ffffff;  /* bold chart label in dark mode */
  --bg:#08090e;--surface:#0e1117;--surface2:#141720;--surface3:#1c2030;--surface4:#252a3a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text-primary:#ffffff;--text-secondary:#8892a4;--text-muted:#3e4759;
  /* Airlearn brand palette */
  --air-teal:#0D9E82;      /* primary brand teal */
  --air-teal-light:#26C99E;/* lighter accent teal */
  --air-coral:#FF6B35;     /* coral/orange accent */
  --air-coral-light:#FF8C5A;
  --air-gold:#F5C542;      /* warm gold */
  --air-purple:#7B6CF6;    /* soft purple */
  /* Platform colors — teal-family for Android, coral for iOS, purple for Overall */
  --ios:#4f8ef7;--android:#a78bfa;--overall:#f5a623;
  --red:#f25757;--amber:#F5C542;--teal:#0D9E82;--pink:#f472b6;
  --sidebar-w:0px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);display:flex;min-height:100vh;font-size:13px;line-height:1.5}

/* ICON SIDEBAR */
.sidebar{display:none}
.s-logo{width:36px;height:36px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:8px;flex-shrink:0;background:var(--surface2)}
.s-logo img{width:36px;height:36px;object-fit:cover;border-radius:10px}
.s-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:all .15s;position:relative}
.s-icon:hover{color:var(--text-secondary);background:rgba(255,255,255,.05)}
.s-icon.active{color:var(--ios);background:rgba(79,142,247,.12)}
.s-icon svg{width:16px;height:16px}
.s-sep{width:28px;height:1px;background:var(--border);margin:6px 0}
.s-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--ios),var(--overall));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;margin-top:auto;cursor:pointer}

/* MAIN */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;min-width:0}

/* TOPBAR */
.topbar-logo{width:30px;height:30px;border-radius:8px;overflow:hidden;flex-shrink:0;margin-right:4px}
.topbar-logo img{width:30px;height:30px;object-fit:cover;border-radius:8px}
.topbar{background:var(--surface);border-bottom:1px solid rgba(255,255,255,0.05);padding:0 20px;height:50px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:14px;font-weight:600;letter-spacing:-.3px;white-space:nowrap;margin-right:4px}
.divider{width:1px;height:20px;background:var(--border2)}

/* FILTER PILL GROUP */
.filter-group{display:flex;align-items:center;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:2px}
.filter-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;padding:0 8px;white-space:nowrap}
.f-btn{padding:4px 11px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-muted);transition:all .15s;user-select:none;white-space:nowrap}
.f-btn:hover{color:var(--text-secondary)}
/* Range dropdown */
.range-select-wrap{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;position:relative;height:34px}
.range-select{background:transparent;border:none;outline:none;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text-primary);padding:0 28px 0 4px;cursor:pointer;appearance:none;-webkit-appearance:none;height:100%}
.range-select option{background:var(--surface2);color:var(--text-primary)}
body.light .range-select-wrap{background:#f0eeea;border-color:rgba(0,0,0,0.1)}
body.light .range-select{color:#1a1a18}
.f-btn.active{color:#fff;font-weight:600}
.f-btn.plat-overall.active,.f-btn.plat-ios.active,.f-btn.plat-android.active{background:var(--surface3);color:var(--text-primary);border:1px solid var(--border2)}
.f-btn.geo.active,.f-btn.weeks.active{background:var(--surface3);color:var(--text-primary);border:1px solid var(--border2)}

.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.date-pill{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:11.5px;color:var(--text-secondary);cursor:pointer;white-space:nowrap}
.date-pill:hover{color:var(--text-primary)}

/* CATEGORY TABS */
.cat-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.cat-tabs::-webkit-scrollbar{height:0}
.cat-tab{padding:10px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.cat-tab:hover{color:var(--text-secondary)}
.cat-tab.active{color:var(--text-primary);border-bottom-color:var(--air-teal-light)}
.cat-count{background:var(--surface3);color:var(--text-muted);font-size:10px;padding:1px 5px;border-radius:10px;margin-left:4px}

/* CONTENT */
.content{padding:18px 20px;display:flex;flex-direction:column;gap:16px;overflow:hidden}

/* CONTEXT ROW */
.ctx-row{display:flex;gap:10px;flex-wrap:wrap}
.ctx-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px}
.ctx-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ctx-label{color:var(--text-muted);margin-right:2px}
.ctx-val{font-weight:500;color:var(--text-primary)}

/* METRIC GRID — 2 per row for clear data labels */
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;min-width:0}

.m-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;cursor:default;transition:all .2s;min-width:0;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.m-card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,.5)}
.m-card-accent{position:absolute;top:0;left:0;width:3px;bottom:0;border-radius:10px 0 0 10px}
.m-card-label{font-size:10.5px;color:var(--text-muted);margin-bottom:8px;line-height:1.3;padding-right:4px}
.m-card-val{font-size:22px;font-weight:600;letter-spacing:-.6px;font-family:var(--mono);line-height:1}
.m-card-footer{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:10.5px}
.delta-up{color:#22c55e;display:flex;align-items:center;gap:2px}
.delta-down{color:#ef4444;display:flex;align-items:center;gap:2px}
.delta-flat{color:var(--text-muted)}
.m-card-spark{height:150px;margin-top:10px;position:relative;width:100%}
.m-card-trend{font-size:10px;color:var(--text-muted)}
.m-card-compare{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;gap:10px}
.mc-plat{display:flex;align-items:center;gap:4px;font-size:10.5px}
.mc-val{font-weight:600;font-family:var(--mono)}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted)}
.section-count{font-size:10px;color:var(--text-muted);background:var(--surface2);padding:2px 6px;border-radius:10px}

/* TREND CHART SECTION */
.trend-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.ts-header{padding:14px 16px 0;display:flex;align-items:flex-start;justify-content:space-between}
.ts-title{font-size:13px;font-weight:600}
.ts-subtitle{font-size:11px;color:var(--text-muted);margin-top:1px}
.ts-body{padding:10px 16px 16px}
.ts-metric-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ts-chip{padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);color:var(--text-muted);transition:all .15s}
.ts-chip:hover{border-color:var(--border2);color:var(--text-secondary)}
.ts-chip.active{border-color:transparent;color:#fff}

/* SPLIT VIEW */
.split-view{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11.5px}
thead th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:9px 12px;color:var(--text-secondary);font-family:var(--mono);font-size:11.5px;white-space:nowrap}
tbody td.row-label{color:var(--text-primary);font-family:var(--font);font-size:12px;font-weight:500}
.badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:20px;font-size:10px;font-weight:500;font-family:var(--font)}
.badge.up{background:rgba(34,197,94,.1);color:#22c55e}
.badge.down{background:rgba(239,68,68,.1);color:#ef4444}
.badge.flat{background:rgba(139,147,168,.1);color:var(--text-secondary)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
@media(max-width:900px){.split-view{grid-template-columns:1fr}.metric-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
@media(max-width:680px){.topbar{flex-wrap:wrap;height:auto;padding:8px 12px;gap:6px}.cat-tabs{padding:0 12px}.content{padding:12px}}

/* VIEW SWITCHER */
.view-switcher{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:2px;gap:2px;flex-shrink:0}
.view-btn{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-muted);transition:all .15s;display:flex;align-items:center;gap:5px;user-select:none}
.view-btn:hover{color:var(--text-secondary)}
.view-btn.active{background:var(--surface3);color:var(--text-primary)}
.view-btn svg{width:13px;height:13px;flex-shrink:0}

/* deep dive picker — kept for legacy, unused */
/* DEEP DIVE — dropdown selector at top */
.dd-top-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.dd-top-label{font-size:12px;color:var(--text-muted);white-space:nowrap;font-weight:500;text-transform:uppercase;letter-spacing:.6px}
.dd-select-wrap{position:relative;flex:1;max-width:500px}
.dd-select-wrap svg.dd-caret{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-muted)}
.dd-select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 34px 8px 12px;font-size:13px;font-weight:500;color:var(--text-primary);font-family:var(--font);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none}
.dd-select:focus{border-color:var(--air-teal)}
.dd-select option{background:var(--surface2);color:var(--text-primary)}
.dd-sel-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:11px;white-space:nowrap}
.dd-sel-badge-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* GEO-ROWS × PLATFORM-COLS grid */
.dd-grid{display:flex;flex-direction:column;gap:20px}
.dd-geo-row{display:flex;flex-direction:column;gap:8px}
.dd-geo-header{display:flex;align-items:center;gap:10px;padding:8px 0 2px}
.dd-geo-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;min-width:70px}
.dd-geo-sep{flex:1;height:1px;background:var(--border)}
.dd-plat-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;min-width:0}

/* Platform column header */
.dd-plat-header{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:4px;padding-left:0}
.dd-plat-col-label{text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:6px 8px;border-radius:6px}

.nine-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .2s;min-width:0;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.nine-card:hover{border-color:var(--border2)}
.nine-card-top{height:3px}
.nine-card-body{padding:12px 14px 10px;box-shadow:none}
.nine-card-label{font-size:10px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.nine-card-val{font-size:22px;font-weight:600;letter-spacing:-.5px;font-family:var(--mono);line-height:1.1}
.nine-card-footer{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px}
.nine-chart-wrap{padding:0 12px 12px;height:220px;position:relative;width:100%;box-sizing:border-box}

.dd-selected-info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.dd-sel-metric{font-size:15px;font-weight:600}
.dd-sel-cat{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.dd-sel-desc{font-size:12px;color:var(--text-muted);flex:1}

@media(max-width:900px){.nine-grid{grid-template-columns:repeat(2,1fr)}.nine-outer{grid-template-columns:1fr}}
@media(max-width:600px){.nine-grid{grid-template-columns:1fr}}

/* ── LIGHT THEME ── */
body.light{
  --label-latest:#111111;  /* bold chart label in light mode */
  --bg:#f5f5f0;--surface:#ffffff;--surface2:#f0eeea;--surface3:#e8e5e0;--surface4:#dedad4;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text-primary:#1a1a18;--text-secondary:#5a6060;--text-muted:#9aa0a0;
}

body.light .topbar{background:#ffffff;border-bottom-color:rgba(0,0,0,0.08)}
body.light .cat-tabs{background:#ffffff;border-bottom-color:rgba(0,0,0,0.08)}
body.light .trend-section,body.light .dd-top-bar,body.light .nine-card,body.light .m-card,
body.light .ctx-pill,body.light .dd-sel-badge{background:#ffffff}
body.light table thead th{border-bottom-color:rgba(0,0,0,0.08)}
body.light tbody tr{border-bottom-color:rgba(0,0,0,0.06)}
body.light tbody tr:hover{background:rgba(0,0,0,0.02)}
body.light .dd-select{background:#f0eeea;color:#1a1a18;border-color:rgba(0,0,0,0.14)}
body.light .filter-group,.light .view-switcher{background:#f0eeea;border-color:rgba(0,0,0,0.1)}
body.light .f-btn.geo.active,.light .f-btn.weeks.active{background:#e8e5e0;color:#1a1a18}
body.light .view-btn.active{background:#e8e5e0;color:#1a1a18}
/* theme toggle button */
.theme-btn{width:32px;height:32px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);
  transition:all .15s;flex-shrink:0}
.theme-btn:hover{color:var(--text-primary);border-color:var(--border2)}
</style>
</head>
<body>

<!-- ICON SIDEBAR -->
<aside class="sidebar">
  <div class="s-logo"><img src="https://play-lh.googleusercontent.com/a-BCE5xbL9m5UcPnhzzfOi_OtI4DWDed5lcowUD0tzGmN5O7vpemqVf6acmNWlSJ9mY=w240-h480" alt="Airlearn" /></div>
  <div class="s-icon active" title="Overview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
  <div class="s-icon" title="Users"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
  <div class="s-icon" title="Funnel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
  <div class="s-sep"></div>
  <div class="s-icon" title="Retention"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
  <div class="s-icon" title="Revenue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
  <div class="s-sep"></div>
  <div class="s-icon" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M20 12h2M2 12h2M12 2v2M12 20v2"/></svg></div>
  <div class="s-avatar" title="Suprabath">SP</div>
</aside>

<main class="main">
  <!-- TOPBAR -->
  <header class="topbar"><div class="topbar-logo"><img src="https://play-lh.googleusercontent.com/a-BCE5xbL9m5UcPnhzzfOi_OtI4DWDed5lcowUD0tzGmN5O7vpemqVf6acmNWlSJ9mY=w240-h480" alt="Airlearn" /></div>
    <div class="topbar-title">Airlearn</div>
    <div class="divider"></div>

    <!-- VIEW SWITCHER -->
    <div class="view-switcher" id="viewSwitcher">
      <div class="view-btn active" data-view="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Overview
      </div>
      <div class="view-btn" data-view="deepdive">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        Metric Deep Dive
      </div>
    </div>
    <div class="divider"></div>

    <!-- Platform -->
    <div class="filter-group" id="platGroup">
      <span class="filter-label">Platform</span>
      <div class="f-btn plat-overall active" data-plat="overall">Overall</div>
      <div class="f-btn plat-android" data-plat="android">Android</div>
      <div class="f-btn plat-ios" data-plat="ios">iOS</div>
    </div>

    <!-- Geography -->
    <div class="range-select-wrap" id="geoGroup">
      <span class="filter-label" style="padding:0 6px 0 10px">Geo</span>
      <select class="range-select" id="geoSelect">
        <option value="overall" selected>Overall</option>
        <option value="us">US</option>
        <option value="uk">UK</option>
      </select>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-muted)"><polyline points="6 9 12 15 18 9"/></svg>
    </div>

    <!-- Range -->
    <div class="range-select-wrap">
      <span class="filter-label" style="padding:0 6px 0 10px">Range</span>
      <select class="range-select" id="rangeSelect">
        <option value="13w" selected>Last 13 weeks</option>
        <option value="26w">Last 26 weeks</option>
        <option value="30d">Last 30 days</option>
        <option value="90d">Last 90 days</option>
      </select>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-muted)"><polyline points="6 9 12 15 18 9"/></svg>

// Plugin: last-point value label on sparklines
const lastLabelPlugin={
  id:'lastLabel',
  afterDraw(chart){
    const cfg=chart.config.options.plugins.lastLabel;
    if(!cfg?.enabled) return;
    const ds=chart.data.datasets[0];
    if(!ds) return;
    const meta=chart.getDatasetMeta(0);
    const last=meta.data[meta.data.length-1];
    if(!last) return;
    const {ctx,chartArea}=chart;
    const val=ds.data[ds.data.length-1];
    if(val===null||val===undefined) return;
    const isLight=document.body.classList.contains('light');
    ctx.save();
    ctx.font='600 10px "DM Mono",monospace';
    // light: use line color so label is visible on white background
    // dark: use white
    ctx.fillStyle=isLight
      ? (ds.borderColor||'#4f8ef7')
      : (getComputedStyle(document.body).getPropertyValue('--label-latest').trim()||'#fff');
    ctx.textAlign='right';
    ctx.textBaseline='middle';
    const x=Math.min(last.x, chartArea.right-2);
    const y=Math.max(last.y-9, chartArea.top+8);
    ctx.fillText(cfg.fmt?cfg.fmt(val):val, x, y);
    ctx.restore();
  }
};
Chart.register(lastLabelPlugin);

// Plugin: all point labels for expanded deep-dive charts
// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}

const allLabelsPlugin={
  id:'allLabels',
  afterDraw(chart){
    const cfg=chart.config.options.plugins.allLabels;
    if(!cfg?.enabled) return;
    const {ctx,chartArea}=chart;
    const placed=[];
    const skipEvery=cfg.skipEvery||1;
    const isLight=document.body.classList.contains('light');
    const latestColor=getComputedStyle(document.body).getPropertyValue('--label-latest').trim()||'#fff';
    const otherColor='rgba(148,163,184,0.75)';

    const FONT_SIZE=9.5;
    const TH=FONT_SIZE+2; // label height estimate
    const GAP=10; // min gap between label and point

    function overlaps(x,y,w,h){
      const pad=4;
      return placed.some(p=>
        !(x-w/2>p.x+p.w/2+pad || x+w/2<p.x-p.w/2-pad || y>p.y+p.h+pad || y+h<p.y-pad)
      );
    }

    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      if(meta.hidden) return;
      const n=meta.data.length;

      // newest→oldest so latest always wins placement
      [...Array(n).keys()].reverse().forEach(i=>{
        const isLast=i===n-1;
        if(!isLast && (n-1-i)%skipEvery!==0) return;
        const pt=meta.data[i];
        const val=ds.data[i];
        if(val==null||!pt) return;

        ctx.save();
        ctx.font=`${isLast?'700':'500'} ${FONT_SIZE}px "DM Mono",monospace`;
        ctx.textAlign='center';
        ctx.textBaseline='middle';

        const text=cfg.fmt?cfg.fmt(val):String(val);
        const tw=ctx.measureText(text).width+2;

        // try above, then below
        const yAbove=Math.max(pt.y-GAP-TH/2, chartArea.top+TH/2+2);
        const yBelow=Math.min(pt.y+GAP+TH/2, chartArea.bottom-TH/2-2);
        const yPos=!overlaps(pt.x,yAbove,tw,TH)
          ? yAbove
          : (!overlaps(pt.x,yBelow,tw,TH) ? yBelow : null);

        if(yPos!==null){
          placed.push({x:pt.x, y:yPos, w:tw, h:TH});
          ctx.globalAlpha=isLast?1:0.65;
          // In light mode: latest label uses the line color (readable on white bg)
          // In dark mode: latest label uses white, others use muted slate
          const lastLabelColor = isLight ? (ds.borderColor||'#4f8ef7') : latestColor;
          const otherLabelColor = isLight ? 'rgba(80,100,130,0.72)' : otherColor;
          ctx.fillStyle = isLast ? lastLabelColor : otherLabelColor;
          ctx.fillText(text, pt.x, yPos);
        }
        ctx.restore();
      });
    });
  }
};
Chart.register(allLabelsPlugin);

// Plugin: vertical crosshair line on hover
const crosshairPlugin={
  id:'crosshair',
  afterDraw(chart){
    if(!chart.tooltip?._active?.length) return;
    const {ctx,chartArea:{top,bottom}}=chart;
    const x=chart.tooltip._active[0].element.x;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x,top);
    ctx.lineTo(x,bottom);
    ctx.lineWidth=1;
    ctx.strokeStyle='rgba(148,163,184,0.25)';
    ctx.setLineDash([4,3]);
    ctx.stroke();
    ctx.restore();
  }
};

// Returns {labels:[], vals:[], isDaily:bool} for the current range + metric combo
function getDisplayData(metricId, plat, geo){
  const key = state.rangeKey;
  const isDaily = key==='30d' || key==='90d';

  if(isDaily){
    const days = key==='30d' ? 30 : 90;
    const cutoff = LAST_DATE_MS - days*86400000;
    // Find start index in DATES array
    // DATES are in order oldest→newest; we need last `days` entries
    let fromIdx = DATES.length;
    for(let i=0;i<DATES.length;i++){
      // Re-parse: DATES are like "29 Dec", "1 Jan" — use index offset from end
      if(DATES.length - i <= days){ fromIdx = i; break; }
    }
    const dailySrc = DATA_DAILY[metricId];
    const allVals = dailySrc ? (dailySrc[plat]?.[geo] || []) : [];
    return {
      labels: DATES.slice(fromIdx),
      vals:   allVals.slice(fromIdx),
      isDaily: true
    };
  }

  // Weekly mode
  const sliceFrom = key==='13w' ? Math.max(0, WEEKS.length-13) : 0;
  const weeklyVals = getVal(metricId, plat, geo);
  return {
    labels: WEEKS.slice(sliceFrom),
    vals:   weeklyVals.slice(sliceFrom),
    isDaily: false
  };
}

function getDisplayVals(metricId){

// ── STATE ────────────────────────────────────────────────────────────────────
let state = {plat:'overall', geo:'overall', cat:'trials', rangeKey:'13w'};
let sparkInstances = {};

function getVal(metricId, plat, geo){
  // Use real data if available
  if(DATA_REAL[metricId]&&DATA_REAL[metricId][plat]&&DATA_REAL[metricId][plat][geo]){
    return DATA_REAL[metricId][plat][geo];
  }
  // fall back to mock
  const cat = Object.values(DATA_RAW).flat().find(m=>m.id===metricId);
  if(!cat) return [];
  return cat.series[plat][geo];
}

function getCurrentVals(metric){
  return getVal(metric.id, state.plat, state.geo);
}

function latest(arr){
  for(let i=arr.length-1;i>=0;i--) if(arr[i]!==null&&arr[i]!==undefined) return arr[i];
  return 0;
}
function prev(arr){
  const nonnull=arr.filter(v=>v!==null&&v!==undefined);
  return nonnull.length>=2?nonnull[nonnull.length-2]:nonnull[0]||0;
}
function delta(arr){
  // walk back from end to find last two non-null values
  const vals=arr.filter(v=>v!==null&&v!==undefined);
  if(vals.length<2) return 0;
  return vals[vals.length-1]-vals[vals.length-2];
}
function pctDelta(arr){return (delta(arr)/Math.abs(prev(arr)))*100;}

        'position:absolute','pointer-events:none','z-index:200',
        'transition:opacity .12s','opacity:0',
        'background:var(--surface)','border:1px solid var(--border2)',
        'border-radius:10px','padding:10px 14px','min-width:120px',
        'box-shadow:0 4px 20px rgba(0,0,0,.3)'
      ].join(';');
      chart.canvas.parentNode.appendChild(el);
    }
    if(tooltip.opacity===0){el.style.opacity=0; return;}
    const dp = tooltip.dataPoints?.[0];
    if(!dp) return;
    const v = dp.parsed.y;
    const i = dp.dataIndex;
    const vals = getVals();
    const valStr = (v===null||v===undefined) ? '–' : (fmt ? fmt(v) : String(v));
    let deltaHtml = '';
    if(i>0 && v!==null && v!==undefined){
      const pv = vals[i-1];
      if(pv!==null && pv!==undefined && pv!==0){
        const diff = v - pv;
        const pct = (diff/Math.abs(pv)*100).toFixed(1);
        const isUp = diff > 0;
        const color = isUp ? '#22c55e' : '#ef4444';
        const sign = isUp ? '+' : '';
        const arrow = isUp ? '▲' : '▼';
        deltaHtml = `<div style="font-size:11.5px;font-weight:500;color:${color};margin-top:4px;display:flex;align-items:center;gap:4px">` +
          `<span>${arrow} ${sign}${pct}%</span>` +
          `<span style="font-weight:400;opacity:.75">from prev ${periodLabel}</span></div>`;
      }
    }
    const weekLabel = tooltip.title?.[0] || '';
    el.innerHTML =
      `<div style="font-size:20px;font-weight:600;color:var(--label-latest);font-family:'DM Mono',monospace;letter-spacing:-.5px;line-height:1">${valStr}</div>` +
      deltaHtml +
      `<div style="font-size:10px;color:var(--text-muted);margin-top:5px;text-transform:uppercase;letter-spacing:.5px">${weekLabel}</div>`;
    el.style.opacity = '1';
    const cw = chart.canvas.parentNode.offsetWidth;
    let left = tooltip.caretX + 14;
    if(left + 150 > cw) left = tooltip.caretX - 164;
    el.style.left = Math.max(0, left) + 'px';
    el.style.top = Math.max(4, tooltip.caretY - 36) + 'px';
  };
}
// ── RENDER HELPERS ───────────────────────────────────────────────────────────
// Compute a stable Y-axis range so small fluctuations don't look dramatic.
// Strategy: floor = dataMin - max(range, dataMin*0.05, 1)
//           ceil  = dataMax + max(range*0.3, 0.5)
// This ensures the visual amplitude is proportional to the actual magnitude.
function yAxisRange(vals){
  const clean = vals.filter(v=>v!==null&&v!==undefined&&!isNaN(v));
  if(!clean.length) return {};
  const mn = Math.min(...clean);
  const mx = Math.max(...clean);
  const range = mx - mn || 0.1;
  // floor drops by at least: the full range, or 5% of the min value, or 1 unit — whichever is largest
  const floorDrop = Math.max(range, mn * 0.05, 1);
  const ceilRise  = Math.max(range * 0.3, 0.5);
  return {
    min: Math.max(0, parseFloat((mn - floorDrop).toFixed(2))),
    max: parseFloat((mx + ceilRise).toFixed(2))
  };
}

function makeSparkline(canvasId, metricId, color, fmt){
  if(sparkInstances[canvasId]){sparkInstances[canvasId].destroy();delete sparkInstances[canvasId];}
  const el=document.getElementById(canvasId);
  if(!el)return;
  const {labels:displayLabels, vals:displayVals, isDaily} = getDisplayData(metricId, state.plat, state.geo);
  const lineColor = color;
  const isManyPts = displayLabels.length > 20;
  const labelFmt = fmt||(v=>typeof v==='number'&&v%1!==0?v.toFixed(1):String(v));
  const periodLabel = isDaily ? 'day' : 'week';
  sparkInstances[canvasId]=new Chart(el,{
    type:'line',
    data:{labels:displayLabels,datasets:[{
      data:displayVals,
      borderColor:lineColor,borderWidth:2,
      pointRadius: isManyPts ? 1.5 : (isDaily ? 2 : 3),
      pointHoverRadius:6,
      pointHoverBackgroundColor:"rgba(255,255,255,0.9)",
      pointHoverBorderWidth:2,
      pointBackgroundColor:lineColor,pointBorderColor:'transparent',
      tension:0.35,fill:true,backgroundColor:lineColor+'18'
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index', intersect:false},
      layout:{padding:{top:isManyPts?34:28, right:10, left:4, bottom:2}},
      plugins:{
        legend:{display:false},
        tooltip:{
          enabled: false,
          external: buildTooltip(fmt, ()=>displayVals, periodLabel),
          callbacks:{ title: ctx => displayLabels[ctx[0].dataIndex] }
        },
        allLabels:{enabled:!isDaily, fmt:labelFmt, skipEvery: isManyPts?2:1}
      },
      scales:{
        x:{display:true,grid:{display:false},border:{display:false},ticks:{font:{size:8},maxTicksLimit:isManyPts?8:5,maxRotation: isDaily?45:0,color:'#3e4759',autoSkip:true}},
        y:{display:false, ...yAxisRange(displayVals)}
      },
      animation:{duration:300}
    }
  });
}

function deltaHtml(arr, fmt, higherGood, periodLabel){
  periodLabel = periodLabel||'WoW';
  const d = delta(arr);
  if(isNaN(d)||!isFinite(d)) return `<span class="delta-flat">— ${periodLabel}</span>`;
  const abs = Math.abs(d);
  const isGood = higherGood ? d>=0 : d<=0;
  const cls = d===0?'delta-flat': (isGood?'delta-up':'delta-down');
  const arrow = d===0?'—': (d>0?'▲':'▼');
  const fmtd = fmt ? fmt(abs) : abs.toFixed(2);
  return `<span class="${cls}">${arrow} ${fmtd}</span><span class="delta-flat">${periodLabel}</span>`;
}

function renderTableSection(metrics){
  if(!metrics.length) return '';
  const isDaily = state.rangeKey==='30d'||state.rangeKey==='90d';
  const periodLabel = isDaily ? 'DoD' : 'WoW';
  // Get display labels and vals from first metric (all share same labels)
  const {labels:DISPLAY_LABELS} = getDisplayData(metrics[0].id, state.plat, state.geo);

  const shortLabels = DISPLAY_LABELS.map((w,i)=>{
    const isLast = i===DISPLAY_LABELS.length-1;
    const parts = w.split(' ');
    const top = parts[1]||parts[0];
    const bot = parts[1]?parts[0]:'';
    return isLast
      ? `<span style="color:var(--ios);font-weight:600">${top}${bot?`<br><span style="font-size:9px">${bot}</span>`:''}</span>`
      : `${top}${bot?`<br><span style="font-size:9px">${bot}</span>`:''}`;
  });

  const headers = ['Metric', ...shortLabels];
  const rows = metrics.map(m=>{
    const {vals:allVals} = getDisplayData(m.id, state.plat, state.geo);
    const cells = allVals.map((v,i)=>{
      if(v===null||v===undefined) return `<td style="text-align:center"><span style="color:var(--text-muted)">–</span></td>`;
      const isLast = i===allVals.length-1;
      const pv = i>0 ? allVals[i-1] : null;
      let badgeHtml = '';
      let titleAttr = '';
      if(pv!==null&&pv!==undefined&&!isNaN(pv)){
        const d = v-pv;
        const isGood=m.higherGood?d>=0:d<=0;
        const cls=d===0?'flat':(isGood?'up':'down');
        const dStr=(d>=0?'+':'')+m.fmt(d);
        if(isLast){
          // Show badge inline only for latest column
          badgeHtml = `<span class="badge ${cls}" style="margin-top:2px;display:inline-flex">${dStr}</span>`;
        } else {
          // Store as tooltip title for hover
          titleAttr = `title="${dStr} ${isDaily?'DoD':'WoW'}"`;
        }
      }
      return `<td ${titleAttr} style="text-align:center;cursor:${titleAttr?'help':'default'};${isLast?'background:rgba(79,142,247,0.05);':''}">
        <div style="font-size:12px;${isLast?'color:var(--label-latest);font-weight:700':'color:var(--text-primary)'}">${m.fmt(v)}</div>
        ${badgeHtml}
      </td>`;
    });
    return `<tr><td class="row-label" style="min-width:200px;max-width:240px;white-space:normal;line-height:1.3">${m.label}</td>${cells.join('')}</tr>`;
  });

  return `<div class="trend-section">
    <div class="ts-header">
      <div>
        <div class="ts-title">${getRangeLabel()} — ${PLAT_NAME[state.plat]} · ${GEO_NAME[state.geo]}</div>
        <div class="ts-subtitle">All ${metrics.length} metrics · badge shows ${periodLabel} delta · latest ${isDaily?'day':'week'} highlighted</div>
      </div>
    </div>
    <div style="padding:10px 0 0">
      <div class="tbl-wrap"><table style="table-layout:auto"><thead><tr style="border-bottom:1px solid var(--border)">${headers.map((h,i)=>`<th style="text-align:${i===0?'left':'center'};line-height:1.3;padding:6px ${i===0?'14px':'8px'};${i===DISPLAY_LABELS.length?'background:rgba(79,142,247,0.06);':''}">${h}</th>`).join('')}</tr></thead><tbody>${rows.join('')}</tbody></table></div>
    </div>
  </div>`;
}

function renderContent(){

// NINE_COMBOS order: overall/overall, overall/us, overall/uk, ios/overall, ios/us, ios/uk, android/overall, android/us, android/uk
// We need: for each geo-row, one card per platform
// geo index 0=overall,1=us,2=uk  |  plat index 0=overall,1=ios,2=android
const GEO_ORDER   = ['overall','us','uk'];
const GEO_LABELS  = ['Overall','US','UK'];
const PLAT_ORDER  = ['overall','ios','android'];
const PLAT_LABELS = ['Overall','iOS','Android'];
const PLAT_COLORS_DD = ['#2dd4bf', PLAT_COLOR.ios, PLAT_COLOR.android]; // Overall=teal, iOS=blue, Android=purple

function renderNineGrid(metric){
  const catMeta = CATS.find(c=>c.id===metric.catId);
  const color = catMeta?.color||'#0D9E82';

  // Platform column headers (horizontal)
  const platHeaders = `<div class="dd-plat-header">
    ${PLAT_LABELS.map((l,i)=>`<div class="dd-plat-col-label" style="color:${PLAT_COLORS_DD[i]};background:${PLAT_COLORS_DD[i]}16">${l}</div>`).join('')}
  </div>`;

  // Geo rows (vertical), each row has 3 platform cards
  const geoRows = GEO_ORDER.map((geo, gi)=>{
    const geoLabel = GEO_LABELS[gi];
    const platCards = PLAT_ORDER.map((plat, pi)=>{
      const lineColor = PLAT_COLORS_DD[pi];
      const vals = getVal(metric.id, plat, geo);
      const cur = latest(vals);
      const d = delta(vals);
      const isGood = metric.higherGood ? d>=0 : d<=0;
      const dCls = d===0?'delta-flat':(isGood?'delta-up':'delta-down');
      const dArrow = d===0?'—':(d>0?'▲':'▼');
      const chartId = `dd_${plat}_${geo}`;
      return `<div class="nine-card">
        <div class="nine-card-top" style="background:${lineColor}"></div>
        <div class="nine-card-body">
          <div class="nine-card-val" style="color:var(--label-latest)">${metric.fmt(cur)}</div>
          <div class="nine-card-footer">
            <span class="${dCls}">${dArrow} ${metric.fmt(Math.abs(d))}</span>
            <span style="color:var(--text-muted)">WoW</span>
          </div>
        </div>
        <div class="nine-chart-wrap"><canvas id="${chartId}" role="img" aria-label="${PLAT_LABELS[pi]} · ${geoLabel} trend">${metric.label}</canvas></div>
      </div>`;
    }).join('');

    return `<div class="dd-geo-row">
      <div class="dd-geo-header">
        <div class="dd-geo-label" style="color:${color}">${geoLabel}</div>
        <div class="dd-geo-sep"></div>
      </div>
      <div class="dd-plat-cols">${platCards}</div>
    </div>`;
  }).join('');

  return `<div>${platHeaders}<div class="dd-grid">${geoRows}</div></div>`;
}

function buildDeepDiveCharts(metric){
  const isDaily = state.rangeKey==='30d'||state.rangeKey==='90d';
  const periodLabel = isDaily ? 'day' : 'week';
  GEO_ORDER.forEach(geo=>{
    PLAT_ORDER.forEach((plat,pi)=>{
      const lineColor = PLAT_COLORS_DD[pi];
      const chartId = `dd_${plat}_${geo}`;
      const el = document.getElementById(chartId);
      if(!el) return;
      if(deepDiveCharts[chartId]) deepDiveCharts[chartId].destroy();
      const {labels:displayLabels, vals:displayVals} = getDisplayData(metric.id, plat, geo);
      const isManyPts = displayLabels.length > 20;
      deepDiveCharts[chartId] = new Chart(el, {
        type:'line',
        data:{
          labels: displayLabels,
          datasets:[{
            data: displayVals,
            borderColor: lineColor,
            backgroundColor: lineColor+'18',
            borderWidth: 2,
            pointRadius: isManyPts ? 1.5 : (isDaily ? 2 : 3.5),
            pointHoverRadius: 5,
            pointBackgroundColor: lineColor,
            pointBorderColor: '#0f1a18',
            pointBorderWidth: 2,
            tension: 0.35,
            fill: true
          }]
        },
        options:{
          responsive:true, maintainAspectRatio:false,
          interaction:{mode:'index', intersect:false},
          layout:{padding:{top: isManyPts?36:30, bottom:4, left:4, right:4}},
          plugins:{
            legend:{display:false},
            tooltip:{enabled:false, external: buildTooltip(metric.fmt, ()=>displayVals, periodLabel), callbacks:{title: ctx=>displayLabels[ctx[0].dataIndex]}},
            allLabels:{enabled:!isDaily, fmt:metric.fmt, skipEvery: isManyPts?2:1}
          },
          scales:{
            x:{display:true, grid:{display:false}, border:{display:false}, ticks:{font:{size:8}, maxTicksLimit: isManyPts?8:6, maxRotation: isDaily?45:0, color:'#3d6058', autoSkip:true}},
            y:{display:true, grid:{color:'rgba(148,163,184,0.08)'}, ticks:{font:{size:9}, maxTicksLimit:3, callback:v=>(v==null?'':metric.fmt(v))}, border:{display:false}, ...yAxisRange(displayVals)}
          }
        }
      });
    });
  });
}

  document.getElementById('catTabs').style.display = isOverview?'flex':'none';
